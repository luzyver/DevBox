services:
  devbox-app:
    container_name: devbox-app
    build: .
    ports:
      - "25:25"
    expose:
      - "8080"
      - "8081"
    environment:
      - SMTP_PORT=25
      - HTTP_PORT=8080
      - REDIS_URL=redis://devbox-redis:6379/0
      - HMAC_SECRET=${HMAC_SECRET}
      - SERVER_IP=${SERVER_IP}
      - INBOX_TTL=${INBOX_TTL}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET}
    depends_on:
      devbox-redis:
        condition: service_healthy
    restart: unless-stopped

  devbox-web:
    container_name: devbox-web
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      - devbox-app
    networks:
      - default
      - cloudflared
    restart: unless-stopped

  devbox-redis:
    container_name: devbox-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

networks:
  cloudflared:
    external: true
